<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelloAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0d1117;
            font-family: 'Courier New', Courier, monospace;
        }
        #typing {
            font-size: 5rem;
            color: #58a6ff;
            border-right: 3px solid #58a6ff;
            padding-right: 8px;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }
    </style>
</head>
<body>
    <div id="typing"></div>

    <script>
        const text = "HelloAI";
        const el = document.getElementById("typing");
        let i = 0;

        function type() {
            if (i < text.length) {
                el.textContent += text.charAt(i);
                i++;
                setTimeout(type, 200);
            }
        }

        type();
    </script>
</body>
</html>
